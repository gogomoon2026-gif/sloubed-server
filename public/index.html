<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOU BED — 제품 가이드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a0a;--white:#fff;--off-white:#fafaf8;
  --g1:#f4f4f2;--g2:#e8e8e5;--g3:#c8c8c4;--g4:#8a8a84;--g5:#444440;
  --accent:#0a0a0a;--blue:#1a4ed8;--red:#b91c1c;
  --yellow:#FFE500;--mint:#A8FF78;--sky:#78C8FF;--pink:#FF9EFF;--orange:#FFB347;
  --sidebar:260px;--header:60px;
  --fs-xs:13px;--fs-sm:15px;--fs-md:16px;--fs-lg:19px;--fs-xl:24px;--fs-xxl:36px;
  --radius:4px;--radius-lg:8px;
  --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--off-white);color:var(--black);font-size:var(--fs-md);min-height:100vh;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--g3);border-radius:2px}

/* ── HEADER ── */
.hd{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header);
  background:var(--white);
  border-bottom:1px solid var(--g2);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
}
.logo{
  
  font-size:22px;font-weight:500;letter-spacing:.18em;
  color:var(--black);text-transform:uppercase;
}
.hd-right{display:flex;align-items:center;gap:14px}
.ss-pill{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--radius);
  border:1px solid var(--g2);font-size:12px;font-weight:600;
  cursor:pointer;transition:var(--transition);background:var(--white);
  letter-spacing:.04em;
}
.ss-pill.on{background:var(--black);color:#fff;border-color:var(--black)}
.ss-pill.off{border-color:#fca5a5;color:var(--red)}
.ss-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}.blink{animation:blink 1.4s infinite}
.notif-btn{
  position:relative;width:38px;height:38px;
  border-radius:var(--radius);background:transparent;
  border:1px solid var(--g2);display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:16px;
  transition:var(--transition);
}
.notif-btn:hover{background:var(--g1)}
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid #fff;display:none}
.adm-btn{
  padding:8px 20px;border-radius:var(--radius);
  background:var(--black);color:#fff;
  font-size:12px;font-weight:700;text-decoration:none;
  letter-spacing:.06em;transition:var(--transition);
}
.adm-btn:hover{background:#222}

/* ── LAYOUT ── */
.app{display:flex;padding-top:var(--header);min-height:100vh}

/* ── SIDEBAR ── */
.sb{
  width:var(--sidebar);flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--g2);
  height:calc(100vh - var(--header));
  position:sticky;top:var(--header);
  overflow-y:auto;display:flex;flex-direction:column;
}
.sb-top{padding:20px 16px 12px}
.sb-action-btn{
  width:100%;padding:12px 14px;
  border-radius:var(--radius);border:1px solid var(--g2);
  font-size:13px;font-weight:700;cursor:pointer;
  transition:var(--transition);
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-bottom:8px;background:var(--white);color:var(--black);
  font-family:'Noto Sans KR',sans-serif;letter-spacing:.02em;
}
.sb-action-btn:hover,.sb-action-btn.active{
  background:var(--black);color:#fff;border-color:var(--black)
}
.sb-divider{height:1px;background:var(--g2);margin:4px 0}
.sb-list{flex:1;padding:8px 12px 24px;overflow-y:auto}
.sb-group-lbl{
  font-size:10px;font-weight:700;color:var(--g4);
  letter-spacing:.1em;text-transform:uppercase;
  padding:16px 4px 8px;
  border-bottom:1px solid var(--g2);margin-bottom:6px;
}
.sb-group-lbl:first-child{padding-top:8px}
.pc{
  padding:12px 10px;border-radius:var(--radius);
  cursor:pointer;transition:var(--transition);
  border:1px solid transparent;margin-bottom:4px;
}
.pc:hover{background:var(--g1)}
.pc.active{background:var(--black);border-color:var(--black)}
.pc.active .pname,.pc.active .psub{color:#fff}
.pname{font-size:14px;font-weight:700;line-height:1.3;color:var(--black)}
.psub{font-size:11px;color:var(--g4);margin-top:2px;letter-spacing:.02em}
.sb-empty{padding:32px 12px;font-size:14px;color:var(--g4);line-height:2;text-align:center}

/* ── MAIN ── */
.main{flex:1;min-width:0;background:var(--off-white)}
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:calc(100vh - var(--header));gap:16px;text-align:center;
}
.empty-word{
  
  font-size:80px;font-weight:300;color:#ddd;
  line-height:1;letter-spacing:.02em;
}
.empty-sub{font-size:13px;color:#bbb;letter-spacing:.06em;text-transform:uppercase}

/* ── SHEET ── */
.sheet{
  position:fixed;top:var(--header);right:0;bottom:0;
  width:calc(100% - var(--sidebar));
  background:var(--white);overflow-y:auto;
  transform:translateX(100%);
  transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:100;
}
.sheet.open{transform:translateX(0)}
.si{padding:40px 48px 120px;max-width:1000px}

/* ── HERO ── */
.hero{
  background:var(--black);
  padding:36px 40px;margin-bottom:32px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);
}
.hero-series{
  font-size:11px;font-weight:600;color:rgba(255,255,255,.35);
  letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;
}
.hero-name{
  
  font-size:52px;font-weight:400;color:#fff;
  letter-spacing:-.01em;line-height:1;margin-bottom:8px;
}
.hero-en{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}
.hero-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px}
.hchip{
  padding:6px 14px;border:1px solid rgba(255,255,255,.15);
  font-size:11px;font-weight:600;color:rgba(255,255,255,.7);
  letter-spacing:.04em;
}
.sf-row{display:flex;align-items:center;gap:14px;margin-top:20px}
.sf-lbl{font-size:10px;color:rgba(255,255,255,.35);font-weight:700;letter-spacing:.1em;text-transform:uppercase;width:64px;flex-shrink:0}
.sf-track{flex:1;height:2px;background:rgba(255,255,255,.15);max-width:200px}
.sf-fill{height:100%;background:#fff}
.sf-val{font-size:13px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.04em}

/* ── TABS ── */
.tabs{
  display:flex;gap:0;margin-bottom:32px;
  border-bottom:1px solid var(--g2);
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;padding:14px 24px;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:var(--transition);color:var(--g4);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  letter-spacing:.02em;
}
.tab:hover{color:var(--black)}
.tab.active{color:var(--black);border-bottom-color:var(--black)}
.tc{display:none}.tc.active{display:block}

/* ── SECTION LABEL ── */
.sec-lbl{
  font-size:10px;font-weight:700;color:var(--g4);
  letter-spacing:.12em;text-transform:uppercase;
  margin-bottom:16px;margin-top:32px;
  display:flex;align-items:center;gap:12px;
}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--g2)}
.sec-lbl:first-child{margin-top:0}

/* ── LAYER LIST ── */
.llist{border:1px solid var(--g2);background:var(--white)}
.li{
  display:flex;align-items:flex-start;gap:16px;
  padding:18px 20px;border-bottom:1px solid var(--g2);
}
.li:last-child{border-bottom:none}
.lnum{
  width:28px;height:28px;border-radius:50%;
  color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
}
.lnm{font-size:15px;font-weight:600;line-height:1.4}
.lds{font-size:13px;color:var(--g4);margin-top:4px;line-height:1.7}

/* ── SIZES ── */
.size-grid{display:flex;gap:8px;flex-wrap:wrap}
.sch{
  padding:16px 20px;border:1px solid var(--g2);
  text-align:center;min-width:80px;
  transition:var(--transition);cursor:default;background:var(--white);
}
.sch:hover{border-color:var(--black);background:var(--black);color:#fff}
.sch:hover .schd{color:rgba(255,255,255,.5)}
.schn{font-size:20px;font-weight:800}
.schd{font-size:11px;color:var(--g4);margin-top:4px;line-height:1.6}

/* ── SOFTNESS BAR ── */
.sf-box{background:var(--g1);padding:20px 24px;border:1px solid var(--g2);margin-top:16px}
.sf-labels{display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px;font-weight:600;color:var(--g4);letter-spacing:.04em}
.sf-track2{height:2px;background:var(--g3)}
.sf-fill2{height:100%;background:var(--black);transition:width .5s}
.sf-val2{text-align:center;margin-top:12px;font-size:18px;font-weight:700;letter-spacing:.04em}

/* ── USP ── */
.ulist{display:flex;flex-direction:column;gap:1px;border:1px solid var(--g2)}
.uitem{
  display:flex;gap:20px;align-items:flex-start;
  padding:20px 24px;background:var(--white);
  border-bottom:1px solid var(--g2);transition:var(--transition);
}
.uitem:last-child{border-bottom:none}
.uitem:hover{background:var(--g1)}
.unum{
  width:32px;height:32px;border-radius:50%;
  color:#fff;font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;
}
.utitle{font-size:15px;font-weight:700;line-height:1.5}
.udesc{font-size:13px;color:var(--g4);margin-top:6px;line-height:1.8}

/* ── FABRIC ── */
.fcard{
  background:var(--white);padding:20px 24px;
  border:1px solid var(--g2);margin-bottom:8px;
  transition:var(--transition);
}
.fcard:hover{border-color:var(--g3)}
.flbl{font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.fnm{font-size:15px;font-weight:700}
.fds{font-size:13px;color:var(--g4);margin-top:6px;line-height:1.7}

/* ── CERT ── */
.cert-list{border:1px solid var(--g2);background:var(--white)}
.ci{display:flex;gap:16px;padding:18px 20px;border-bottom:1px solid var(--g2);align-items:flex-start}
.ci:last-child{border-bottom:none}
.cck{
  width:28px;height:28px;border-radius:50%;
  background:var(--black);color:#fff;font-size:13px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
}
.ctt{font-size:14px;font-weight:700;margin-bottom:4px}
.cds{font-size:13px;color:var(--g4);line-height:1.7}

/* ── QNA ── */
.qitem{
  background:var(--white);padding:20px 24px;
  margin-bottom:8px;border:1px solid var(--g2);
  transition:var(--transition);
}
.qitem:hover{border-color:var(--g3)}
.qq{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.6}
.qa{font-size:13px;color:var(--g5);line-height:1.9;padding-top:14px;border-top:1px solid var(--g2)}

/* ── PLAN ── */
.plan-card{
  background:var(--white);padding:28px 32px;
  border:1px solid var(--g2);border-left:3px solid var(--black);
}
.plan-head{
  
  font-size:22px;font-weight:500;line-height:1.6;margin-bottom:16px;
}
.plan-body{font-size:14px;color:var(--g5);line-height:2.1}

/* ── BOTTOM BTNS ── */
.bot-btns{
  display:flex;gap:10px;margin-top:32px;
  position:sticky;bottom:0;background:var(--white);
  padding:20px 0;border-top:1px solid var(--g2);
}
.bbtn{
  flex:1;padding:16px;font-size:14px;font-weight:700;
  cursor:pointer;border:none;transition:var(--transition);
  font-family:'Noto Sans KR',sans-serif;letter-spacing:.04em;
}
.bbtn.out{background:var(--g1);color:var(--black);border:1px solid var(--g2)}
.bbtn.out:hover{background:var(--g2)}
.bbtn.fill{background:var(--black);color:#fff}
.bbtn.fill:hover{background:#222}

/* ── COMPARE ── */
.cmp-slots{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.cslot{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;background:var(--black);color:#fff;
  font-size:13px;font-weight:600;letter-spacing:.02em;
}
.cslot-x{
  width:20px;height:20px;border-radius:50%;
  background:rgba(255,255,255,.2);display:flex;
  align-items:center;justify-content:center;
  cursor:pointer;font-size:11px;font-weight:700;
}
.cslot-x:hover{background:rgba(255,255,255,.4)}
.cadd{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border:1px dashed var(--g3);
  font-size:13px;font-weight:600;color:var(--g4);
  cursor:pointer;transition:var(--transition);
}
.cadd:hover{border-color:var(--black);color:var(--black)}
.filter-box{background:var(--g1);padding:20px 24px;margin-bottom:24px;border:1px solid var(--g2)}
.filter-title{font-size:11px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.filter-section{margin-bottom:14px}
.filter-section:last-child{margin-bottom:0}
.filter-sec-lbl{font-size:11px;font-weight:700;color:var(--g3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.filter-chips{display:flex;flex-wrap:wrap;gap:6px}
.fchip{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border:1px solid var(--g2);
  background:var(--white);font-size:13px;font-weight:600;
  cursor:pointer;transition:var(--transition);user-select:none;
}
.fchip:hover{border-color:var(--black)}
.fchip.on{background:var(--black);color:#fff;border-color:var(--black)}
.fchk{
  width:14px;height:14px;border:1px solid var(--g3);
  background:var(--white);flex-shrink:0;position:relative;transition:all .15s;
}
.fchk::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--black);opacity:0;transition:opacity .15s}
.fchip.on .fchk{background:#fff;border-color:#fff}
.fchip.on .fchk::after{opacity:1}
.ctbl-wrap{overflow-x:auto;border:1px solid var(--g2)}
.ctbl{width:100%;border-collapse:collapse;background:var(--white);min-width:500px}
.ctbl thead tr{background:var(--black)}
.ctbl thead th{padding:14px 18px;text-align:left;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:.04em}
.ctbl thead th:first-child{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);width:110px}
.ctbl td{padding:14px 18px;border-bottom:1px solid var(--g2);font-size:14px;line-height:1.7;color:var(--g5);vertical-align:top;white-space:pre-wrap;word-break:break-word}
.ctbl tr:last-child td{border-bottom:none}
.ctbl td.rlbl{font-size:11px;font-weight:700;color:var(--g4);letter-spacing:.06em;background:var(--g1);vertical-align:middle;white-space:nowrap;width:110px}
.ctbl tr.diff-row td:not(.rlbl){background:#fffbf0}
.ctbl tr:hover td:not(.rlbl){background:var(--g1)}
.hl-0{background:var(--yellow);color:#111;padding:1px 6px;font-weight:800;display:inline}
.hl-1{background:var(--mint);color:#111;padding:1px 6px;font-weight:800;display:inline}
.hl-2{background:var(--sky);color:#111;padding:1px 6px;font-weight:800;display:inline}
.hl-3{background:var(--pink);color:#111;padding:1px 6px;font-weight:800;display:inline}
.hl-4{background:var(--orange);color:#111;padding:1px 6px;font-weight:800;display:inline}
.diff-red{font-weight:700;color:var(--red)}

/* ── NOTIF PANEL ── */
.npanel{
  position:fixed;top:64px;right:16px;z-index:300;
  width:320px;background:var(--white);
  border:1px solid var(--g2);
  box-shadow:0 8px 40px rgba(0,0,0,.08);
  display:none;overflow:hidden;
}
.npanel.open{display:block;animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.nph{
  padding:16px 20px;border-bottom:1px solid var(--g2);
  display:flex;align-items:center;justify-content:space-between;
}
.npt{font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.npx{font-size:18px;cursor:pointer;color:var(--g4);line-height:1}
.nit{display:flex;gap:12px;padding:14px 20px;border-bottom:1px solid var(--g2)}
.nit:last-child{border-bottom:none}
.nid{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px}
.nit2{font-size:14px;font-weight:600;margin-bottom:3px}
.nid2{font-size:12px;color:var(--g4);display:flex;gap:8px;align-items:center}
.nemp{padding:24px;font-size:14px;color:var(--g4);text-align:center}

/* ── BRAND COMPARE ── */
.brand-tabs{
  display:flex;gap:0;margin-bottom:32px;
  border-bottom:1px solid var(--g2);overflow-x:auto;scrollbar-width:none;
}
.brand-tabs::-webkit-scrollbar{display:none}
.brand-tab{
  flex-shrink:0;padding:14px 22px;font-size:13px;font-weight:600;
  cursor:pointer;transition:var(--transition);color:var(--g4);
  border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.02em;
}
.brand-tab:hover{color:var(--black)}
.brand-tab.active{color:var(--black);border-bottom-color:var(--black)}
.brand-section{margin-bottom:48px}
.brand-section-title{
  
  font-size:28px;font-weight:400;letter-spacing:-.01em;
  margin-bottom:8px;
}
.brand-section-desc{font-size:13px;color:var(--g4);margin-bottom:20px;line-height:1.8}
.brand-table-wrap{overflow-x:auto;border:1px solid var(--g2);margin-bottom:16px}
.brand-table{border-collapse:collapse;background:var(--white);min-width:600px;table-layout:fixed;width:100%}
.brand-table th{
  padding:14px 16px;text-align:center;font-size:12px;font-weight:700;
  background:var(--black);color:#fff;
  border-right:1px solid rgba(255,255,255,.08);letter-spacing:.04em;
  position:relative;overflow:hidden;word-break:keep-all;
}
.brand-table th.slou{background:var(--blue)}
.brand-table th:first-child{background:#222;text-align:left;width:90px}
.brand-table td{
  padding:13px 16px;border-bottom:1px solid var(--g2);border-right:1px solid var(--g2);
  font-size:13px;line-height:1.7;color:var(--g5);text-align:center;vertical-align:top;
  word-break:keep-all;overflow-wrap:break-word;
}
.brand-table td:first-child{font-size:11px;font-weight:700;color:var(--g4);background:var(--g1);text-align:left;white-space:nowrap}
.brand-table td.slou-val{background:#eff6ff;font-weight:700;color:var(--blue)}
.brand-table td.pain{color:var(--red);font-weight:700}
.brand-table tr:last-child td{border-bottom:none}
/* 리사이즈 핸들 */
.col-resizer{
  position:absolute;right:0;top:0;bottom:0;width:6px;
  cursor:col-resize;background:transparent;z-index:10;
  user-select:none;
}
.col-resizer:hover,.col-resizer.resizing{background:rgba(255,255,255,.3)}
.brand-table-hint{
  font-size:11px;color:var(--g4);margin-bottom:8px;
  display:flex;align-items:center;gap:6px;
}
.brand-table-hint::before{content:'↔';font-size:13px}
.brand-table tr.sub-head td{background:#f0f0ee;font-weight:700;font-size:11px;color:var(--g5);text-align:left;letter-spacing:.04em;text-transform:uppercase}
.brand-table tr:hover td{background:var(--g1)}
.material-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.material-card{
  background:var(--white);border:1px solid var(--g2);
  padding:20px 24px;transition:var(--transition);
}
.material-card:hover{border-color:var(--g3);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.mc-cat{font-size:10px;font-weight:700;color:var(--g4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.mc-name{font-size:15px;font-weight:700;margin-bottom:6px;color:var(--black)}
.mc-stars{color:#c9a227;font-size:14px;margin-bottom:10px;letter-spacing:2px}
.mc-feature{font-size:13px;color:var(--g5);line-height:1.7;margin-bottom:8px;padding-left:14px;position:relative}
.mc-feature::before{content:'—';position:absolute;left:0;color:var(--g3)}
.mc-effect{font-size:13px;color:var(--blue);line-height:1.7;padding:10px 14px;background:#eff6ff;border-left:2px solid var(--blue);margin-top:10px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex;animation:mfade .15s ease}
@keyframes mfade{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;padding:32px}
.modal-handle{width:36px;height:3px;background:var(--g2);margin:0 auto 24px}
.modal-title{font-size:28px;font-weight:400;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--g4);margin-bottom:24px;letter-spacing:.02em}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.mit{padding:16px;border:1px solid var(--g2);cursor:pointer;transition:var(--transition)}
.mit:hover{border-color:var(--black)}
.mit.chosen{border-color:var(--black);background:var(--black)}
.mit.chosen .mitn,.mit.chosen .mits{color:#fff}
.mit.added{opacity:.35;pointer-events:none}
.mitn{font-size:15px;font-weight:700;color:var(--black);margin-bottom:3px}
.mits{font-size:12px;color:var(--g4)}
.modal-btns{display:flex;gap:8px}

/* ── SIDEBAR TOGGLE ── */
.sb-group-lbl{
  font-size:11px;font-weight:800;color:var(--black);
  letter-spacing:.04em;
  padding:10px 12px;margin:0 -12px;
  border-bottom:1px solid var(--g2);
  background:var(--g1);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.sb-group-lbl:hover{background:var(--g2)}
.sb-group-lbl .toggle-arrow{font-size:10px;color:var(--g4);transition:transform .2s;flex-shrink:0}
.sb-group-lbl.collapsed .toggle-arrow{transform:rotate(-90deg)}
.sb-group-body{overflow:hidden;transition:max-height .25s ease}
.sb-group-body.collapsed{max-height:0!important}

/* ── QUOTE ── */
.quote-wrap{font-family:'Noto Sans KR',sans-serif}
.quote-header{text-align:center;padding:24px 0 16px;border-bottom:3px solid var(--black);margin-bottom:20px}
.quote-brand{font-size:22px;font-weight:900;letter-spacing:.2em;margin-bottom:4px}
.quote-title{font-size:14px;font-weight:700;letter-spacing:.1em}
.quote-section-title{font-size:12px;font-weight:800;background:var(--black);color:#fff;padding:8px 14px;letter-spacing:.06em;margin-bottom:0}
.quote-table{width:100%;border-collapse:collapse;border:1px solid var(--black);margin-bottom:20px;font-size:13px}
.quote-table th{padding:9px 10px;background:var(--g1);border:1px solid var(--g2);font-weight:700;font-size:12px;text-align:center;white-space:nowrap}
.quote-table td{padding:9px 10px;border:1px solid var(--g2);text-align:center;vertical-align:middle}
.quote-table td.left{text-align:left}
.quote-add-btn{width:100%;padding:10px;border:1px dashed var(--g3);background:transparent;font-size:13px;font-weight:600;color:var(--g4);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;margin-bottom:20px}
.quote-add-btn:hover{border-color:var(--black);color:var(--black)}
.quote-discount-box{background:var(--g1);border:1px solid var(--g2);padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.quote-discount-box label{font-size:13px;font-weight:700;white-space:nowrap}
.quote-discount-box input{border:1px solid var(--g2);padding:8px 12px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;width:80px;text-align:center;outline:none}
.quote-result-box{background:var(--black);color:#fff;padding:16px 20px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.quote-result-label{font-size:13px;color:rgba(255,255,255,.6);font-weight:600}
.quote-result-val{font-size:22px;font-weight:900;letter-spacing:-.02em}
.quote-result-save{font-size:13px;color:#86efac;font-weight:700}
.quote-print-btn{width:100%;padding:14px;background:var(--black);color:#fff;border:none;font-size:14px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:.06em;transition:all .2s;margin-bottom:8px}
.quote-print-btn:hover{background:#222}
.q-toggle-group{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0}
.q-toggle-btn{padding:5px 11px;border:1px solid var(--g2);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;color:var(--black);border-radius:3px}
.q-toggle-btn:hover{border-color:var(--black)}
.q-toggle-btn.on{background:var(--black);color:#fff;border-color:var(--black)}
@media print{
  .sb,.hd,.npanel,.bot-btns,.quote-print-btn,.quote-add-btn,.quote-discount-box button{display:none!important}
  .sheet{transform:none!important;width:100%!important;position:static!important}
  .si{padding:20px!important}
}
</style>
</head>
<body>

<header class="hd">
  <div class="logo">Slou Bed</div>
  <div class="hd-right">
    <div class="ss-pill ld" id="sspill" onclick="fetchAll()">
      <div class="ss-dot blink" id="ssd"></div>
      <span id="sstext">연결 중</span>
    </div>
    <div class="notif-btn" id="notifBtn" onclick="toggleNotif()">🔔<div class="notif-dot" id="ndot"></div></div>
    <a href="admin.html" class="adm-btn">Admin</a>
  </div>
</header>

<div class="npanel" id="npanel">
  <div class="nph"><span class="npt">업데이트</span><span class="npx" onclick="document.getElementById('npanel').classList.remove('open')">✕</span></div>
  <div id="nitems"><div class="nemp">업데이트 없음</div></div>
</div>

<div class="app">
  <nav class="sb">
    <div class="sb-top">
      <button class="sb-action-btn" id="cmpBtn" onclick="openCmpView()">제품 비교</button>
      <button class="sb-action-btn" id="brandBtn" onclick="openBrandView()">브랜드 비교</button>
      <button class="sb-action-btn" id="quickBtn" onclick="openQuickView()">📋 빠른 조회</button>
      <button class="sb-action-btn" id="quoteBtn" onclick="openQuoteView()">🧾 견적서</button>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-list" id="sbList"><div class="sb-empty">연결 중...</div></div>
  </nav>

  <main class="main">
    <div class="empty-state" id="emptyState">
      <div class="empty-word">Good<br>Night</div>
      <div class="empty-sub">제품을 선택하세요</div>
    </div>
    <div class="sheet" id="sheet">
      <div class="si" id="si"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="prodModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">제품 선택</div>
    <div class="modal-sub">비교할 제품을 추가하세요 — 최대 5개</div>
    <div class="pgrid" id="mpgrid"></div>
    <div class="modal-btns">
      <button class="bbtn out" onclick="document.getElementById('prodModal').classList.remove('open')">취소</button>
      <button class="bbtn fill" onclick="applyAdd()">추가</button>
    </div>
  </div>
</div>

<script>

const API = (location.hostname==='localhost'||location.hostname==='127.0.0.1'?'http://localhost:3000':'https://sloubed-server-production.up.railway.app')+'/api';
const SOFTNESS = {'Soft':95,'Medium Soft':72,'Medium':50,'Medium Firm':30,'Firm':12};
const BADGE_COLORS = ['#FF4B4B','#2D6CFF','#111','#FF8C00','#00A878','#7B2FBE','#E91E8C','#00B4D8'];
const SW_COLORS = ['#f5f0e8','#e8dfc8','#d4c89a','#d8dde4','#c4d4de','#dcdad4','#c8a882','#e4ddd5','#bcd8e8','#d4c0b4'];

let P={}, CL=[], cur=null;
let isBrandMode=false;
let cmpSlots=[]; // 비교 선택된 id 배열
let modalChosen=null;
let isCmpMode=false;

// 활성화된 필터 기준
const ALL_FILTERS = [
  {key:'series',  label:'시리즈',   fn:p=>p._series||'—'},
  {key:'softness',label:'쿠션감',   fn:p=>p.softness||'—'},
  {key:'layers',  label:'레이어 수', fn:p=>p._layers.length?`${p._layers.length}단계`:'—'},
  {key:'layerList',label:'레이어 구성',fn:p=>p._layers.map(l=>l.name).join('\n')||'—', isLayerList:true},
  {key:'sizes',   label:'사이즈',   fn:p=>p._sizes.map(s=>s.name).join(' / ')||'—'},
  {key:'height',  label:'높이',     fn:p=>p._sizes[0]?.h?p._sizes[0].h+'mm':'—'},
  {key:'cover',   label:'커버 소재', fn:p=>p.materialTop||'—'},
  {key:'side',    label:'측면 소재', fn:p=>p.materialSide||'—'},
  {key:'sleep',   label:'수면 타깃', fn:p=>(p.targetTags?.sleep||[]).join(', ')||'—'},
  {key:'gender',  label:'성별 타깃', fn:p=>(p.targetTags?.gender||[]).join(', ')||'—'},
  {key:'age',     label:'연령 타깃', fn:p=>(p.targetTags?.age||[]).join(', ')||'—'},
  {key:'usp1',    label:'USP 01',   fn:p=>p._usps[0]?.title||'—'},
  {key:'usp2',    label:'USP 02',   fn:p=>p._usps[1]?.title||'—'},
  {key:'cert',    label:'인증',     fn:p=>(p.certs||[]).filter(c=>c).map(c=>typeof c==='string'?c:(c.title||'')).filter(Boolean).join(', ')||'—'},
];

let activeFilters = new Set(['series','softness','layers','layerList','sizes','height','cover','sleep']);

function norm(r){
  const name=r.nameKo||r.name||'—';
  const layers=(r.layerItems&&r.layerItems.length)?r.layerItems.filter(l=>l&&l.name).map(l=>({name:l.name,desc:l.desc||''})):(r.materials||[]).filter(l=>l&&l.name).map(l=>({name:l.name,desc:'',tag:l.tag||''}));
  const sizes=(r.specs&&Array.isArray(r.specs)&&r.specs.length)?r.specs.map(s=>({name:s.label||s.name||'',w:s.w||'',d:s.d||'',h:s.h||''})):(r.sizes||[]);
  const usps=(r.usp||[]).filter(u=>u).map(u=>u.title?{title:u.title,desc:[u.desc1,u.desc2,u.desc3].filter(Boolean).join(' ').trim()}:{title:u.text||'',desc:''});
  return {...r,_name:name,_nameEn:r.nameEn||'',_series:r.seriesKo||r.seriesEn||'',_layers:layers,_sizes:sizes,_usps:usps};
}

let isFetching = false;
let fetchFailCount = 0;
let pollTimer = null;

// 타임아웃 fetch (10초)
async function fetchWithTimeout(url, ms=10000){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), ms);
  try{
    const r = await fetch(url, {signal: ctrl.signal});
    clearTimeout(timer);
    return r;
  } catch(e){
    clearTimeout(timer);
    throw e;
  }
}

async function fetchAll(){
  if(isFetching) return; // 중복 요청 방지
  isFetching = true;
  setSS('ld');
  try{
    // products 먼저 로드 (필수), history는 별도로 (선택)
    const r1 = await fetchWithTimeout(`${API}/products`);
    if(!r1.ok) throw new Error('서버 응답 오류: '+r1.status);
    const d = await r1.json();
    P={};
    const prods = Array.isArray(d)?d:Object.values(d.products||d||{});
    prods.forEach(v=>{if(v&&v.id)P[v.id]=norm(v);});

    // history는 실패해도 무시
    try{
      const r2 = await fetchWithTimeout(`${API}/history`, 5000);
      const hist = await r2.json();
      CL = Array.isArray(hist)?hist:[];
    } catch{ CL=[]; }

    fetchFailCount = 0;
    setSS('on', Object.keys(P).length);
    renderSB(); renderNotif();
    if(cur&&P[cur]) renderDetail(cur);
    else if(isCmpMode) renderCmp();
    else if(isBrandMode) renderBrandView();

    // 폴링 간격 조정: 정상 시 30초, 실패 중엔 더 빠르게
    schedulePoll(30000);
  } catch(e){
    fetchFailCount++;
    setSS('off');
    const msg = fetchFailCount <= 2
      ? '서버 웨이크업 중...<br>잠시 기다려 주세요 ☕'
      : '연결 실패 — 재시도 중';
    document.getElementById('sbList').innerHTML=`<div class="sb-empty">${msg}</div>`;

    // 실패 시 재시도: 1~2회는 5초, 이후 15초
    const retryMs = fetchFailCount <= 2 ? 5000 : 15000;
    schedulePoll(retryMs);
  } finally{
    isFetching = false;
  }
}

function schedulePoll(ms){
  if(pollTimer) clearTimeout(pollTimer);
  pollTimer = setTimeout(fetchAll, ms);
}

function setSS(s,n){
  const el=document.getElementById('sspill'),dot=document.getElementById('ssd'),tx=document.getElementById('sstext');
  el.className='ss-pill '+s;
  dot.className='ss-dot'+(s==='ld'?' blink':'');
  if(s==='on') tx.textContent=`온라인 · ${n}개`;
  else if(s==='off') tx.textContent='연결 실패 — 재시도 중';
  else tx.textContent='연결 중...';
}

// 사이드바
function renderSB(){
  const ps=Object.values(P);
  if(!ps.length){document.getElementById('sbList').innerHTML='<div class="sb-empty">등록된 제품 없음<br><br>피그마에서 저장해주세요</div>';return;}
  const groups={};
  ps.forEach(p=>{const g=p._series||'기타';if(!groups[g])groups[g]=[];groups[g].push(p);});
  let h='',gi=0;
  Object.entries(groups).forEach(([grp,items])=>{
    const gid='grp_'+gi;
    h+=`<div class="sb-group-lbl" onclick="toggleSBGroup('${gid}',this)">
      <span>${grp}</span><span class="toggle-arrow">▼</span>
    </div>
    <div class="sb-group-body" id="${gid}" style="max-height:800px">`;
    items.forEach(p=>{
      h+=`<div class="pc${cur===p.id&&!isCmpMode&&!isBrandMode?' active':''}" id="pc-${p.id}" onclick="selectP('${p.id}')">
        <div class="pname">${p._name}</div>
        <div class="psub">${p._nameEn||p.softness||''}</div>
      </div>`;
    });
    h+=`</div>`;
    gi+=items.length;
  });
  document.getElementById('sbList').innerHTML=h;
}

function toggleSBGroup(id,lbl){
  const body=document.getElementById(id);
  if(!body)return;
  const collapsed=body.classList.contains('collapsed');
  if(collapsed){body.classList.remove('collapsed');body.style.maxHeight='800px';lbl.classList.remove('collapsed');}
  else{body.classList.add('collapsed');lbl.classList.add('collapsed');}
}


function selectP(id){
  isCmpMode=false; isBrandMode=false; cur=id;
  document.querySelectorAll('.pc').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById(`pc-${id}`);if(el)el.classList.add('active');
  document.getElementById('cmpBtn').classList.remove('active');
  document.getElementById('emptyState').style.display='none';
  renderDetail(id);
  document.getElementById('sheet').classList.add('open');
}

function renderDetail(id){
  const p=P[id];if(!p)return;
  const sfp=SOFTNESS[p.softness]||50;
  const sc=p.status==='new'?`<span class="hchip">🆕 신규</span>`:p.status==='updated'?`<span class="hchip">✏️ 업데이트</span>`:'';
  const hasPlan=p.planHead||p.planBody, hasQna=(p.qna||[]).filter(q=>q&&q.q).length>0;

  document.getElementById('si').innerHTML=`
    <div class="hero">
      <div class="hero-series">— ${p._series||p._nameEn||''}</div>
      <div class="hero-name">${p._name}</div>
      <div class="hero-en">${p._nameEn||''}</div>
      ${p.softness?`<div class="sf-row"><span class="sf-lbl">Softness</span><div class="sf-track"><div class="sf-fill" style="width:${100-sfp}%"></div></div><span class="sf-val">${p.softness}</span></div>`:''}
      <div class="hero-chips">${sc}${p._layers.length?`<span class="hchip">${p._layers.length}단계</span>`:''}${p._sizes.length?`<span class="hchip">${p._sizes.map(s=>s.name).join('/')}</span>`:''}</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="st('layer',this)">레이어</div>
      <div class="tab" onclick="st('size',this)">사이즈</div>
      <div class="tab" onclick="st('usp',this)">USP</div>
      <div class="tab" onclick="st('target',this)">타깃</div>
      ${hasPlan?'<div class="tab" onclick="st(\'plan\',this)">기획의도</div>':''}
      ${hasQna?'<div class="tab" onclick="st(\'qna\',this)">Q&A</div>':''}
    </div>

    <div class="tc active" id="tc-layer">
      <div class="llist">
        ${p._layers.map((l,i)=>`<div class="li"><div class="lnum" style="background:${BADGE_COLORS[i%BADGE_COLORS.length]}">${String(i+1).padStart(2,'0')}</div><div class="lsw" style="background:${SW_COLORS[i%SW_COLORS.length]}"></div><div><div class="lnm">${l.name}</div>${l.desc?`<div class="lds">${l.desc}</div>`:''}</div></div>`).join('')||'<div style="padding:14px;color:#999;font-size:13px">레이어 정보 없음</div>'}
      </div>
      ${p.materialTop||p.materialSide?`<div style="margin-top:14px"><div class="sec-lbl">커버 소재</div>${p.materialTop?`<div class="fcard"><div class="flbl">TOP</div><div class="fnm">${p.materialTop}</div>${p.materialTopDesc?`<div class="fds">${p.materialTopDesc}</div>`:''}</div>`:''}${p.materialSide?`<div class="fcard"><div class="flbl">SIDE</div><div class="fnm">${p.materialSide}</div>${p.materialSideDesc?`<div class="fds">${p.materialSideDesc}</div>`:''}</div>`:''}</div>`:''}
    </div>

    <div class="tc" id="tc-size">
      <div class="size-grid">${p._sizes.map(s=>`<div class="sch"><div class="schn">${s.name}</div><div class="schd">${s.w&&s.d?s.w+'×'+s.d:''}${s.h?' H'+s.h:''}</div></div>`).join('')||'<div style="color:#999">정보 없음</div>'}</div>
      ${p.softness?`<div class="sf-box"><div class="sf-labels"><span>Soft</span><span>Firm</span></div><div class="sf-track2"><div class="sf-fill2" style="width:${100-sfp}%"></div></div><div class="sf-val2">${p.softness}</div></div>`:''}
    </div>

    <div class="tc" id="tc-usp">
      <div class="ulist">${p._usps.map((u,i)=>`<div class="uitem"><div class="unum" style="background:${BADGE_COLORS[i%BADGE_COLORS.length]}">${String(i+1).padStart(2,'0')}</div><div><div class="utitle">${u.title}</div>${u.desc?`<div class="udesc">${u.desc.substring(0,100)}${u.desc.length>100?'...':''}</div>`:''}</div></div>`).join('')||'<div style="color:#999">정보 없음</div>'}</div>
    </div>

    <div class="tc" id="tc-target">
      ${(p.targetTags&&(p.targetTags.sleep||p.targetTags.gender||p.targetTags.age))?`<div class="tchips">${(p.targetTags.sleep||[]).map(t=>`<div class="tchip sleep">${t}</div>`).join('')}${(p.targetTags.gender||[]).map(t=>`<div class="tchip gender">${t}</div>`).join('')}${(p.targetTags.age||[]).map(t=>`<div class="tchip age">${t}</div>`).join('')}</div>`:'<div style="color:#999;font-size:13px">타깃 정보 없음</div>'}
      ${(p.certs&&p.certs.length)?`<div style="margin-top:16px"><div class="sec-lbl">인증 현황</div><div style="border:1.5px solid var(--g2);border-radius:14px;padding:4px 14px">${p.certs.filter(c=>c).map((c,i)=>{const t=typeof c==='string'?c:(c.title||c.label||'');const b=c.body||'';return`<div class="ci"><div class="cck">${String(i+1).padStart(2,'0')}</div><div><div class="ctt">${t}</div>${b?`<div class="cds">${b.substring(0,80)}...</div>`:''}</div></div>`;}).join('')}</div></div>`:''}
    </div>

    <div class="tc" id="tc-plan">
      <div class="plan-card">${p.planHead?`<div class="plan-head">${p.planHead}</div>`:''}${p.planBody?`<div class="plan-body">${p.planBody}</div>`:''}</div>
    </div>

    <div class="tc" id="tc-qna">
      ${(p.qna||[]).filter(q=>q&&q.q).map(q=>`<div class="qitem"><div class="qq">Q. ${q.q}</div>${q.a?`<div class="qa">${q.a}</div>`:''}</div>`).join('')||'<div style="color:#999">Q&A 없음</div>'}

function addToCmp(id){
  if(!cmpSlots.includes(id)&&cmpSlots.length<5) cmpSlots.push(id);
  openCmpView();
}

function renderCmp(){
  // 슬롯 헤더
  const slotHtml=cmpSlots.map((id,i)=>{
    const p=P[id]; if(!p) return '';
    return `<div class="cslot"><span>${p._name}</span><div class="cslot-x" onclick="removeCmp('${id}')">✕</div></div>`;
  }).join('');
  const addHtml=cmpSlots.length<5?`<div class="cadd" onclick="openProdModal()">＋ 추가</div>`:'';

  // 필터 박스
  const filterGroups=[
    {label:'기본 정보',   keys:['series','softness','layers']},
    {label:'소재 / 구성', keys:['layerList','cover','side']},
    {label:'사이즈',     keys:['sizes','height']},
    {label:'타깃',       keys:['sleep','gender','age']},
    {label:'USP / 인증', keys:['usp1','usp2','cert']},
  ];
  const filterHtml=filterGroups.map(g=>{
    const chips=g.keys.map(k=>{
      const f=ALL_FILTERS.find(f=>f.key===k); if(!f) return '';
      const on=activeFilters.has(k);
      return `<div class="fchip ${on?'on':''}" onclick="toggleFilter('${k}')"><div class="fchk"></div>${f.label}</div>`;
    }).join('');
    return `<div class="filter-section"><div class="filter-sec-lbl">${g.label}</div><div class="filter-chips">${chips}</div></div>`;
  }).join('');

  // 비교 테이블
  const ps=cmpSlots.map(id=>P[id]).filter(Boolean);
  let tableHtml='';
  if(ps.length>=2){
    const thHtml=`<th></th>`+ps.map((p,i)=>`<th>${p._name}<br><span style="font-size:10px;opacity:.5;font-weight:500">${p.softness||''}</span></th>`).join('');
    const rows=ALL_FILTERS.filter(f=>activeFilters.has(f.key));
    const tbodyHtml=rows.map(row=>{
      const vals=ps.map(p=>row.fn(p));
      const allSame=vals.every(v=>v===vals[0]);

      // 레이어 구성은 줄단위 비교 — 다른 줄만 형광펜
      if(row.isLayerList){
        const allLines = vals.map(v=>v.split('\n'));
        const allLineSet = new Set(allLines.flat().filter(l=>l&&l!=='—'));
        const commonLines = [...allLineSet].filter(line=>
          allLines.every(lines=>lines.includes(line))
        );
        const tds = cmpSlots.map((id,i)=>{
          const p = P[id]; if(!p) return '<td>—</td>';
          const v = vals[i];
          // 단면도 이미지
          const imgSrc = p.images && p.images.crossSection;
          const imgHtml = imgSrc
            ? `<img src="${imgSrc}" style="width:100%;max-width:180px;border-radius:8px;margin-bottom:8px;display:block;border:1px solid var(--g2)">`
            : '';
          if(v==='—') return `<td>${imgHtml}—</td>`;
          const lines = v.split('\n');
          const linesHtml = lines.map(line=>{
            if(!line) return '';
            const onlyHere = !allLines.filter((_,j)=>j!==i).some(ll=>ll.includes(line));
            const isCommon = commonLines.includes(line);
            if(onlyHere) return `<span class="hl-${i}" style="display:block;margin-bottom:2px">${line}</span>`;
            if(!isCommon) return `<span style="display:block;margin-bottom:2px;color:#c00;font-weight:700">${line}</span>`;
            return `<span style="display:block;margin-bottom:2px;color:#444">${line}</span>`;
          }).join('');
          return `<td>${imgHtml}${linesHtml}</td>`;
        }).join('');
        const hasDiff = vals.some((v,i)=>v.split('\n').some(line=>!commonLines.includes(line)));
        return `<tr class="${hasDiff?'diff-row':''}"><td class="rlbl">${row.label}</td>${tds}</tr>`;
      }

      const tds=vals.map((v,i)=>{
        if(v==='—'||allSame) return `<td>${v}</td>`;
        const sameCount=vals.filter(x=>x===v).length;
        if(sameCount===1) return `<td><span class="hl-${i}">${v}</span></td>`;
        return `<td class="diff-red">${v}</td>`;
      }).join('');
      return `<tr class="${!allSame?'diff-row':''}"><td class="rlbl">${row.label}</td>${tds}</tr>`;
    }).join('');
    tableHtml=`
      <div class="ctbl-wrap">
        <table class="ctbl">
          <thead><tr>${thHtml}</tr></thead>
          <tbody>${tbodyHtml}</tbody>
        </table>
      </div>
      <div style="font-size:11px;color:#999;text-align:center;padding:8px 0;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap">
        <span><span class="hl-0">값</span> <span class="hl-1">값</span> 이 제품만 고유</span>
        <span style="color:#c00;font-weight:700">값</span><span> 일부 차이</span>
      </div>`;
  } else {
    tableHtml=`<div style="padding:28px;text-align:center;color:#999;font-size:13px;background:var(--g1);border-radius:var(--cr)">제품을 2개 이상 추가하면 비교표가 나타납니다</div>`;
  }

  document.getElementById('si').innerHTML=`
    <div style="font-size:24px;font-weight:900;margin-bottom:4px;letter-spacing:-.02em">제품 비교</div>
    <div style="font-size:13px;color:#999;margin-bottom:16px">최대 5개 · 비교 기준을 자유롭게 선택하세요</div>

    <div class="cmp-slots">${slotHtml}${addHtml}</div>

    <div class="filter-box">
      <div class="filter-title">📊 비교 기준 선택</div>
      ${filterHtml}
    </div>

    ${tableHtml}

    <div class="bot-btns" style="margin-top:16px">
      <button class="bbtn out" onclick="document.getElementById('sheet').classList.remove('open')">← 목록</button>
    </div>`;
}

function toggleFilter(key){
  if(activeFilters.has(key)) activeFilters.delete(key);
  else activeFilters.add(key);
  renderCmp();
}

function removeCmp(id){
  cmpSlots=cmpSlots.filter(s=>s!==id);
  renderCmp();
}

function openProdModal(){
  modalChosen=null;
  document.getElementById('mpgrid').innerHTML=Object.values(P).map(p=>{
    const added=cmpSlots.includes(p.id);
    return `<div class="mit ${added?'added':''} ${modalChosen===p.id?'chosen':''}" onclick="chooseP('${p.id}',this)">
      <div class="mitn">${p._name}</div>
      <div class="mits">${p._nameEn||''} · ${p._layers.length}단계${p.softness?' · '+p.softness:''}</div>
      ${added?'<div style="font-size:10px;color:#bbb;margin-top:2px">이미 추가됨</div>':''}
    </div>`;
  }).join('');
  document.getElementById('prodModal').classList.add('open');
}
function chooseP(id,el){
  if(cmpSlots.includes(id)) return;
  modalChosen=id;
  document.querySelectorAll('.mit').forEach(e=>e.classList.remove('chosen'));
  el.classList.add('chosen');
}
function applyAdd(){
  if(!modalChosen) return;
  if(!cmpSlots.includes(modalChosen)&&cmpSlots.length<5) cmpSlots.push(modalChosen);
  document.getElementById('prodModal').classList.remove('open');
  renderCmp();
}

function addQuoteItem(){quoteItems.push({name:'',size:'',color:'',price:'',qty:1});renderQuoteView();}
function removeQuoteItem(idx){if(quoteItems.length<=1)return;quoteItems.splice(idx,1);renderQuoteView();}

function updateQuoteItem(idx,field,val){
  quoteItems[idx][field]=val;
  if(field==='name'){quoteItems[idx].size='';quoteItems[idx].color='';renderQuoteView();return;}
  if(field==='size'){document.querySelectorAll(`#q-size-${idx} .q-toggle-btn`).forEach(b=>b.classList.toggle('on',b.textContent.trim()===val));}
  if(field==='color'){document.querySelectorAll(`#q-color-${idx} .q-toggle-btn`).forEach(b=>b.classList.toggle('on',b.textContent.trim()===val));}
  updateQuoteCalc();
}

function updateQuoteCalc(){
  const disc=parseFloat(document.getElementById('q-disc')?.value||quoteDiscount)||0;
  quoteDiscount=disc;
  let totalOrigin=0,totalSale=0;
  quoteItems.forEach((item,idx)=>{
    const price=parseInt((item.price||'').toString().replace(/[^0-9]/g,''))||0;
    const qty=parseInt(item.qty)||1;
    const origin=price*qty;
    const discAmt=Math.round(origin*(disc/100));
    const sale=origin-discAmt;
    totalOrigin+=origin;totalSale+=sale;
    const sEl=document.getElementById('q-sale-'+idx);if(sEl)sEl.textContent=sale?sale.toLocaleString()+'원':'—';
    const dEl=document.getElementById('q-disc-'+idx);if(dEl)dEl.textContent=discAmt?discAmt.toLocaleString()+'원':'—';
  });
  const saved=totalOrigin-totalSale;
  const rEl=document.getElementById('q-result');
  if(rEl)rEl.innerHTML=`
    <div><div class="quote-result-label">소비자가 합계</div><div style="font-size:15px;font-weight:700;color:rgba(255,255,255,.6)">${totalOrigin.toLocaleString()}원</div></div>
    <div style="text-align:center"><div class="quote-result-label">할인율</div><div class="quote-result-val">${disc}%</div></div>
    <div style="text-align:right"><div class="quote-result-label">최종 판매가</div><div class="quote-result-val">${totalSale.toLocaleString()}원</div><div class="quote-result-save">↓ ${saved.toLocaleString()}원 절약</div></div>`;
}

  const today=new Date().toLocaleDateString('ko-KR');
  const productOpts=Object.values(P).map(p=>`<option value="${p._name}">${p._name}</option>`).join('');
  const rows=quoteItems.map((item,idx)=>{
    const price=parseInt((item.price||'').toString().replace(/[^0-9]/g,''))||0;
    const qty=parseInt(item.qty)||1;
    const matchP=Object.values(P).find(pp=>pp._name===item.name);
    const sizes=matchP?matchP._sizes:[];

// ── 테이블 컬럼 리사이즈 ──
function makeTableResizable(table){
  if(!table) return;
  const ths = table.querySelectorAll('th');
  ths.forEach((th, idx)=>{
    // 첫 번째 컬럼(구분 열)은 제외
    if(idx === 0) return;

    // 기본 너비 설정
    if(!th.style.width){
      th.style.width = th.offsetWidth + 'px';
    }

    // 핸들 생성
    const handle = document.createElement('div');
    handle.className = 'col-resizer';
    th.appendChild(handle);

    let startX, startW;

    handle.addEventListener('mousedown', e=>{
      e.preventDefault();
      startX = e.clientX;
      startW = th.offsetWidth;
      handle.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      const onMove = e=>{
        const diff = e.clientX - startX;
        const newW = Math.max(80, startW + diff);
        th.style.width = newW + 'px';
        th.style.minWidth = newW + 'px';
      };
      const onUp = ()=>{
        handle.classList.remove('resizing');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // 터치 지원
    handle.addEventListener('touchstart', e=>{
      e.preventDefault();
      startX = e.touches[0].clientX;
      startW = th.offsetWidth;
      const onMove = e=>{
        const diff = e.touches[0].clientX - startX;
        const newW = Math.max(80, startW + diff);
        th.style.width = newW + 'px';
        th.style.minWidth = newW + 'px';
      };
      const onEnd = ()=>{
        handle.removeEventListener('touchmove', onMove);
        handle.removeEventListener('touchend', onEnd);
      };
      handle.addEventListener('touchmove', onMove, {passive:false});
      handle.addEventListener('touchend', onEnd);
    }, {passive:false});
  });
}

// 브랜드 탭 전환 시 리사이즈 초기화
function initResizableTables(){
  document.querySelectorAll('.brand-table').forEach(t=>makeTableResizable(t));
}
